<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bifrost Admin</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: "Geist", "Noto Sans SC", system-ui, sans-serif;
        background: #f7f8fa;
        color: #172033;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(560px, calc(100vw - 32px));
        border: 1px solid #dfe4ec;
        border-radius: 14px;
        background: #ffffff;
        padding: 20px;
        box-shadow: 0 18px 60px -24px rgba(15, 23, 42, 0.24);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 16px;
        line-height: 24px;
      }

      p {
        margin: 0;
        font-size: 13px;
        line-height: 20px;
        color: #556070;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Bifrost Admin Preview</h1>
      <p>The container entry for the admin web app is healthy and reachable.</p>
    </main>
  </body>
</html>
